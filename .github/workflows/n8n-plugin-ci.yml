name: n8n plugin CI

on:
   push:
      branches: [main]
      paths:
         - "n8n/plugin/**"
         - ".github/workflows/n8n-plugin-ci.yml"
   pull_request:
      paths:
         - "n8n/plugin/**"
         - ".github/workflows/n8n-plugin-ci.yml"
   workflow_dispatch:

jobs:
   build:
      runs-on: ubuntu-latest
      defaults:
         run:
            working-directory: n8n/plugin

      steps:
         - name: Checkout
           uses: actions/checkout@v7

         - name: Setup Node 20
           uses: actions/setup-node@v4
           with:
              node-version: "20"
              cache: "npm"
              cache-dependency-path: n8n/plugin/package-lock.json

         - name: Install dependencies
           run: npm ci

         - name: Lint
           run: npm run lint

         - name: Build (tsc)
           run: npm run build
