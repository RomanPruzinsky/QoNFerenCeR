name: Markdown lint

on:
   push:
      branches: [main]
      paths:
         - "**/*.md"
         - ".github/workflows/markdownlint.yml"
         - ".markdownlint.json"
   pull_request:
      paths:
         - "**/*.md"
         - ".github/workflows/markdownlint.yml"
         - ".markdownlint.json"

jobs:
   lint:
      runs-on: ubuntu-latest
      steps:
         - name: Checkout
           uses: actions/checkout@v6

         - name: Run markdownlint-cli2
           uses: DavidAnson/markdownlint-cli2-action@v17
           with:
              globs: "**/*.md"
