name: Backend Docker image → GHCR

on:
   push:
      tags: ["v*"]
   workflow_dispatch: # manual trigger in GitHub UI

jobs:
   build-and-push:
      runs-on: ubuntu-latest
      permissions:
         contents: read
         packages: write

      steps:
         - name: Checkout
           uses: actions/checkout@v6

         - name: Setup Docker Buildx
           uses: docker/setup-buildx-action@v3

         - name: Login to GHCR
           uses: docker/login-action@v3
           with:
              registry: ghcr.io
              username: ${{ github.actor }}
              password: ${{ secrets.GITHUB_TOKEN }}

         - name: Extract metadata (tags, labels)
           id: meta
           uses: docker/metadata-action@v5
           with:
              images: ghcr.io/${{ github.repository_owner }}/qonferencer-backend
              tags: |
                 type=semver,pattern={{major}}.{{minor}}            # 1.0
                 type=raw,value=latest,enable={{is_default_branch}} # latest na main push

         - name: Build and push
           uses: docker/build-push-action@v6
           with:
              context: ./backend
              push: true
              tags: ${{ steps.meta.outputs.tags }}
              labels: ${{ steps.meta.outputs.labels }}
              cache-from: type=gha
              cache-to: type=gha,mode=max
