name: Dependabot auto-merge

# Auto-merges Dependabot PRs for the github-actions ecosystem only (CI-tooling
# version bumps). Requires: repo "Allow auto-merge" enabled AND a required status
# check on main (branch protection) — otherwise --auto cannot be enabled.
# App/library bumps (gradle, docker, npm) are intentionally NOT auto-merged.

on: pull_request

permissions:
   contents: write
   pull-requests: write

jobs:
   auto-merge:
      runs-on: ubuntu-latest
      if: github.actor == 'dependabot[bot]'
      steps:
         - name: Fetch Dependabot metadata
           id: meta
           uses: dependabot/fetch-metadata@v2
           with:
              github-token: ${{ secrets.GITHUB_TOKEN }}

         - name: Enable auto-merge for github-actions updates
           if: steps.meta.outputs.package-ecosystem == 'github_actions'
           run: gh pr merge --auto --squash "$PR_URL"
           env:
              PR_URL: ${{ github.event.pull_request.html_url }}
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
