name: Shared CI

on:
   push:
      branches: [main]
      paths:
         - "shared/**"
         - ".github/workflows/shared-ci.yml"
   pull_request:
      paths:
         - "shared/**"
         - ".github/workflows/shared-ci.yml"
   workflow_dispatch:

jobs:
   build:
      runs-on: ubuntu-latest
      defaults:
         run:
            working-directory: shared

      steps:
         - name: Checkout
           uses: actions/checkout@v7

         - name: Setup JDK 21
           uses: actions/setup-java@v4
           with:
              distribution: temurin
              java-version: "21"

         - name: Setup Gradle
           uses: gradle/actions/setup-gradle@v4

         - name: ktlint check
           run: ./gradlew ktlintCheck

         - name: Unit tests
           run: ./gradlew test

         - name: Build
           run: ./gradlew build
