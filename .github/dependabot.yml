version: 2

updates:
   - package-ecosystem: github-actions
     directory: /
     schedule:
        interval: monthly
     open-pull-requests-limit: 5
     commit-message:
        prefix: chore(ci)
        include: scope
     groups:
        github-actions:
           patterns:
              - "*"

   - package-ecosystem: gradle
     directory: /android
     schedule:
        interval: monthly
     open-pull-requests-limit: 5
     commit-message:
        prefix: chore(android)
        include: scope
     groups:
        android-dependencies:
           patterns:
              - "*"

   - package-ecosystem: gradle
     directory: /backend
     schedule:
        interval: monthly
     open-pull-requests-limit: 5
     commit-message:
        prefix: chore(backend)
        include: scope
     groups:
        backend-dependencies:
           patterns:
              - "*"

   - package-ecosystem: gradle
     directory: /shared
     schedule:
        interval: monthly
     open-pull-requests-limit: 5
     commit-message:
        prefix: chore(shared)
        include: scope
     groups:
        shared-dependencies:
           patterns:
              - "*"

   - package-ecosystem: npm
     directory: /n8n/plugin
     schedule:
        interval: monthly
     open-pull-requests-limit: 5
     commit-message:
        prefix: chore(n8n)
        include: scope
     groups:
        n8n-dependencies:
           patterns:
              - "*"

   # Enable once deploy/Dockerfile exists (see deploy/AI_suggested.md).
   # directory must point at the Dockerfile's folder (/deploy, not /backend),
   # since the backend image build needs both backend/ and shared/ in context.
